<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FitTrack — Full MVP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#0E9F6E;--accent-dark:#0B7D57;--accent-soft:#E3F5EE;
  --bg:#F6F4EE;--card:#FFFFFF;--ink:#1B1B17;--muted:#76746B;
  --line:#EAE7DE;--line-strong:#D9D5C8;
  --green:#16A34A;--green-bg:#DCFCE7;--blue:#2563EB;--blue-bg:#DBEAFE;
  --purple:#7C3AED;--purple-bg:#EDE9FE;--amber:#D97706;--amber-bg:#FEF3C7;
  --red:#DC2626;--red-bg:#FEE2E2;--pink:#DB2777;--pink-bg:#FCE7F3;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:#E8E5DC;color:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:18px}
#app{width:100%;max-width:430px;height:880px;max-height:95vh;background:var(--bg);border-radius:40px;overflow:hidden;position:relative;box-shadow:0 30px 70px rgba(0,0,0,.22);display:flex;flex-direction:column;border:8px solid #111}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.screen::-webkit-scrollbar{display:none}
/* generic */
.bar{display:flex;align-items:center;gap:12px;padding:18px 18px 10px;position:sticky;top:0;background:var(--bg);z-index:5}
.bar.solid{background:var(--card);border-bottom:1px solid var(--line)}
.iconbtn{width:40px;height:40px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);font-size:20px;flex-shrink:0;border:1px solid var(--line)}
.iconbtn:active{transform:scale(.93)}
.bar-title{font-size:19px;font-weight:800;flex:1;min-width:0;letter-spacing:-.3px}
.pad{padding:6px 18px 30px}
.bigbtn{width:100%;border:none;background:var(--accent);color:#fff;font-family:inherit;font-size:16px;font-weight:700;padding:17px;border-radius:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.bigbtn:active{transform:scale(.98);background:var(--accent-dark)}
.bigbtn.ghost{background:#fff;color:var(--accent);border:2px solid var(--accent)}
.bigbtn.dim{opacity:.5}
.bottom-cta{padding:14px 18px 18px}
.ava{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block}
.fadein{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.toast{position:absolute;left:18px;right:18px;bottom:96px;background:var(--ink);color:#fff;padding:15px 18px;border-radius:14px;font-weight:600;font-size:14px;opacity:0;transform:translateY(20px);transition:.3s;z-index:60;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
/* bottom nav */
.tabbar{display:flex;background:var(--card);border-top:1px solid var(--line);padding:8px 4px calc(8px + env(safe-area-inset-bottom))}
.tabitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;cursor:pointer;color:var(--muted);font-size:10.5px;font-weight:700}
.tabitem .ic{font-size:21px}
.tabitem.on{color:var(--accent)}
.tabitem:active{transform:scale(.92)}
/* dashboard */
.hello{padding:6px 18px 2px}
.hello .sm{color:var(--muted);font-size:14px;font-weight:600}
.hello h1{font-size:25px;font-weight:800;letter-spacing:-.5px}
.rolebanner{margin:10px 18px;background:var(--purple-bg);border-radius:14px;padding:11px 14px;font-size:12.5px;font-weight:600;color:var(--purple);display:flex;align-items:center;gap:8px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:6px 18px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
.stat .v{font-size:26px;font-weight:800;line-height:1}
.stat .l{font-size:12px;font-weight:600;color:var(--muted);margin-top:4px}
.stat .d{font-size:11px;font-weight:700;margin-top:4px}
.sec-h{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px}
.sec-h h2{font-size:17px;font-weight:800}
.sec-h .more{color:var(--accent);font-size:13px;font-weight:700;cursor:pointer}
.sess-row{background:var(--card);margin:0 18px 8px;border-radius:14px;padding:11px 13px;display:flex;align-items:center;gap:11px;border:1px solid var(--line)}
.sess-time{font-size:12px;font-weight:700;color:var(--muted);width:42px;flex-shrink:0}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sess-main{flex:1;min-width:0}
.sess-name{font-weight:700;font-size:14px}
.sess-sub{font-size:11.5px;color:var(--muted);font-weight:500}
.mini-mark{font-size:11px;font-weight:700;padding:5px 10px;border-radius:9px;border:1px solid var(--line-strong);background:transparent;cursor:pointer;color:var(--muted)}
.sbadge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:9px}
.act-row{display:flex;gap:10px;padding:9px 18px;align-items:flex-start}
.act-ic{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.act-tx{font-size:13px;line-height:1.4}.act-tm{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600}
/* client list */
.searchwrap{padding:6px 18px 4px}
.search{width:100%;background:var(--card);border:1px solid var(--line-strong);border-radius:13px;padding:13px 14px;font-family:inherit;font-size:15px;color:var(--ink)}
.search:focus{outline:none;border-color:var(--accent)}
.filters{display:flex;gap:7px;padding:8px 18px;overflow-x:auto}
.filters::-webkit-scrollbar{display:none}
.fchip{flex-shrink:0;border:1px solid var(--line-strong);background:var(--card);border-radius:20px;padding:7px 13px;font-size:12.5px;font-weight:700;cursor:pointer;color:var(--muted)}
.fchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.client-row{background:var(--card);margin:0 18px 10px;border-radius:16px;padding:13px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid var(--line)}
.client-row:active{transform:scale(.985)}
.client-row.paused{opacity:.62}
.cr-main{flex:1;min-width:0}.cr-name{font-weight:700;font-size:15px}
.cr-sub{font-size:12px;color:var(--muted);font-weight:500;margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cr-chev{color:var(--line-strong);font-size:22px}
.fab{position:absolute;right:20px;bottom:96px;width:58px;height:58px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(14,159,110,.45);z-index:20}
.fab:active{transform:scale(.92)}
/* detail */
.dhead{background:var(--card);padding:20px 18px 18px;border-bottom:1px solid var(--line);text-align:center}
.dava{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:24px;margin:0 auto 10px}
.dname{font-size:21px;font-weight:800}
.dmeta{color:var(--muted);font-size:13px;font-weight:500;margin-top:3px}
.dtags{display:flex;gap:7px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.subtabs{display:flex;gap:6px;padding:12px 18px;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:4}
.subtabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;border:none;background:var(--bg);border-radius:11px;padding:9px 14px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted)}
.stab.on{background:var(--accent);color:#fff}
.block{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 18px}
.block-t{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.block-t .edit{color:var(--accent);font-size:12px;cursor:pointer;text-transform:none;letter-spacing:0}
.kv{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;border-bottom:1px solid var(--line)}
.kv:last-child{border:none}.kv .k{color:var(--muted);font-weight:500}.kv .v{font-weight:600;text-align:right}
.welcome-note{background:var(--accent-soft);border-radius:12px;padding:14px;font-size:13.5px;line-height:1.6}
.welcome-note b{display:block;margin-bottom:4px;color:var(--accent-dark)}
.action-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;display:flex;align-items:center;gap:13px;cursor:pointer;margin:0 18px 10px}
.action-card:active{transform:scale(.98)}
.ac-ic{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ac-main{flex:1}.ac-title{font-size:15px;font-weight:700}.ac-sub{color:var(--muted);font-size:12px;font-weight:500;margin-top:1px}
/* weeks + program */
.weeks{display:flex;gap:7px;padding:12px 18px 4px;overflow-x:auto}.weeks::-webkit-scrollbar{display:none}
.wk{flex-shrink:0;width:44px;height:44px;border-radius:13px;border:1.5px solid var(--line-strong);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-weight:800;font-size:14px;color:var(--muted);font-family:inherit}
.wk small{font-size:8px;font-weight:700;text-transform:uppercase}
.wk.done{background:var(--green-bg);border-color:var(--green-bg);color:var(--green)}
.wk.cur{background:var(--accent);border-color:var(--accent);color:#fff}
.wk.plan{border-style:dashed;color:var(--line-strong)}
.wk:active{transform:scale(.93)}
.wkbanner{padding:4px 18px;font-size:12px;color:var(--muted);font-weight:600}
.ex-card{background:var(--card);margin:10px 18px;border-radius:16px;padding:14px;border:1px solid var(--line)}
.ex-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ex-name{font-weight:700;font-size:15px}.ex-target{color:var(--muted);font-size:12px;font-weight:600;margin-top:1px}
.ex-trend{font-size:11.5px;font-weight:700;padding:4px 8px;border-radius:9px}
.stepper-row{display:flex;gap:9px}
.stepper{flex:1;background:var(--bg);border-radius:12px;padding:9px}
.stepper .lbl{font-size:10px;font-weight:700;color:var(--muted);text-align:center;text-transform:uppercase}
.stepper .ctl{display:flex;align-items:center;justify-content:space-between;margin-top:5px}
.stp-btn{width:34px;height:34px;border-radius:10px;background:var(--card);font-size:20px;font-weight:700;cursor:pointer;color:var(--accent-dark);display:flex;align-items:center;justify-content:center;border:1px solid var(--line)}
.stp-btn:active{transform:scale(.9);background:var(--accent-soft)}
.stp-val{font-size:19px;font-weight:800;min-width:46px;text-align:center}
.stp-val small{font-size:11px;font-weight:600;color:var(--muted)}
.grid-toggle{margin:6px 18px;display:flex;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:3px}
.gt{flex:1;text-align:center;padding:8px;border-radius:9px;font-size:12.5px;font-weight:700;cursor:pointer;color:var(--muted)}
.gt.on{background:var(--accent);color:#fff}
.fullgrid{margin:8px 18px;border:1px solid var(--line);border-radius:14px;overflow:hidden;overflow-x:auto}
.fullgrid table{border-collapse:collapse;width:100%;min-width:430px}
.fullgrid th,.fullgrid td{padding:8px 5px;text-align:center;border-right:1px solid var(--line);border-bottom:1px solid var(--line);font-size:11.5px}
.fullgrid th{background:var(--bg);font-weight:700;color:var(--muted)}
.fullgrid td.ex{text-align:left;font-weight:700;white-space:nowrap;padding-left:10px;font-size:12px}
.fullgrid td .wt{font-weight:800}.fullgrid td .rp{font-size:9.5px;color:var(--muted)}
.fullgrid .nowcol{background:var(--accent-soft)}
/* attendance */
.att-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:4px 18px}
.cal-h{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0}
.cal-d{aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;background:var(--card);border:1px solid var(--line)}
.cal-d.present{background:var(--green-bg);color:var(--green);border-color:var(--green-bg)}
.cal-d.absent{background:var(--red-bg);color:var(--red);border-color:var(--red-bg)}
.cal-d.empty{background:transparent;border:none}
.att-opt{width:100%;border:2px solid var(--line-strong);background:var(--card);border-radius:15px;padding:16px;margin:0 18px 10px;width:calc(100% - 36px);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:12px;font-size:16px;font-weight:700;color:var(--ink)}
.att-opt .em{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px}
.att-opt.sp{border-color:var(--green);background:var(--green-bg)}
.att-opt.sa{border-color:var(--red);background:var(--red-bg)}
.att-opt.sc{border-color:var(--amber);background:var(--amber-bg)}
.att-ck{margin-left:auto;font-size:21px;opacity:0}
.att-opt.sp .att-ck,.att-opt.sa .att-ck,.att-opt.sc .att-ck{opacity:1}
/* progress chart */
.chart-wrap{padding:6px 6px}
.measure-pick{display:flex;gap:6px;padding:0 18px 8px}
.mp{border:1px solid var(--line-strong);background:var(--card);border-radius:18px;padding:5px 11px;font-size:11.5px;font-weight:700;cursor:pointer;color:var(--muted)}
.mp.on{background:var(--ink);color:#fff;border-color:var(--ink)}
/* media */
.media-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:6px 18px}
.media-card{border-radius:14px;overflow:hidden;border:1px solid var(--line);background:var(--card)}
.media-img{aspect-ratio:3/4;display:flex;align-items:flex-end;padding:8px;color:#fff;font-size:11px;font-weight:700;position:relative}
.media-cap{padding:8px 10px;font-size:11.5px;font-weight:600}
.media-cap small{color:var(--muted);display:block;font-weight:500}
.upload-tile{aspect-ratio:3/4;border:2px dashed var(--line-strong);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer}
/* onboarding */
.steps{display:flex;gap:6px;padding:12px 18px}
.step-dot{flex:1;height:5px;border-radius:3px;background:var(--line-strong)}
.step-dot.on{background:var(--accent)}
.step-title{padding:4px 18px 2px;font-size:22px;font-weight:800;letter-spacing:-.4px}
.step-sub{padding:0 18px 10px;font-size:13.5px;color:var(--muted);font-weight:500}
.field{margin:0 18px 14px}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
.field input,.field textarea{width:100%;border:1.5px solid var(--line-strong);background:var(--card);border-radius:12px;padding:13px;font-family:inherit;font-size:15px;color:var(--ink);font-weight:500}
.field textarea{min-height:78px;resize:none}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.selectwrap{position:relative}
.field select{width:100%;border:1.5px solid var(--line-strong);background:var(--card);border-radius:12px;padding:13px 38px 13px 13px;font-family:inherit;font-size:15px;color:var(--ink);font-weight:600;appearance:none;-webkit-appearance:none;cursor:pointer}
.field select:focus{outline:none;border-color:var(--accent)}
.selectwrap::after{content:'▾';position:absolute;right:15px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:15px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.cat-chip{flex:1;min-width:calc(50% - 4px);border:1.5px solid var(--line-strong);background:var(--card);border-radius:12px;padding:13px 10px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;text-align:center;color:var(--ink)}
.cat-chip.sel{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-dark)}
.seg{display:flex;gap:8px}
.seg button{flex:1;border:1.5px solid var(--line-strong);background:var(--card);border-radius:12px;padding:11px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;color:var(--ink)}
.seg button.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-dark)}
.daygrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.timegrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.pill-sel{border:1.5px solid var(--line-strong);background:var(--card);border-radius:11px;padding:11px 4px;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:700;text-align:center;color:var(--ink)}
.pill-sel.sel{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-dark)}
.pill-sel:active{transform:scale(.94)}
.pick-hint{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:7px}
.coach-sel{display:flex;align-items:center;gap:11px;border:1.5px solid var(--line-strong);background:var(--card);border-radius:12px;padding:11px 13px;cursor:pointer;margin-bottom:8px}
.coach-sel.sel{border-color:var(--accent);background:var(--accent-soft)}
.coach-sel .ck{margin-left:auto;font-size:18px;color:var(--accent);opacity:0}
.coach-sel.sel .ck{opacity:1}
.msg-card{border:1.5px solid var(--line-strong);background:var(--card);border-radius:12px;padding:13px;font-size:13.5px;line-height:1.5;cursor:pointer;margin-bottom:8px;color:var(--ink);position:relative}
.msg-card.sel{border-color:var(--accent);background:var(--accent-soft)}
.msg-card:active{transform:scale(.99)}
/* announcement */
.ann-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin:0 18px 10px}
.ann-type{font-size:11px;font-weight:700;padding:3px 9px;border-radius:8px;display:inline-block;margin-bottom:8px}
.ann-title{font-weight:700;font-size:15px}.ann-msg{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5}
.ann-meta{font-size:11px;color:var(--muted);font-weight:600;margin-top:8px;display:flex;align-items:center;gap:6px}
.preview-phone{margin:10px 18px;background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:14px}
.preview-phone .pl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px}
.notif-card{background:var(--card);border-radius:12px;padding:12px;display:flex;gap:10px;border:1px solid var(--line)}
.notif-ic{width:36px;height:36px;border-radius:9px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
/* coach attendance */
.clock-card{margin:14px 18px;background:var(--accent);border-radius:20px;padding:20px;color:#fff;text-align:center}
.clock-time{font-size:38px;font-weight:800;letter-spacing:-1px}
.clock-date{font-size:13px;font-weight:600;opacity:.85;margin-top:2px}
.clock-status{font-size:13px;font-weight:600;opacity:.9;margin-top:10px}
.clockbtn{margin-top:14px;background:#fff;color:var(--accent-dark);border:none;font-family:inherit;font-weight:700;font-size:15px;padding:14px;border-radius:14px;width:100%;cursor:pointer}
.coach-row{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;margin:0 18px 9px;display:flex;align-items:center;gap:12px}
.coach-times{margin-left:auto;text-align:right;font-size:12px}
.coach-times .in{color:var(--green);font-weight:700}.coach-times .out{color:var(--muted);font-weight:600}
/* exercise lib */
.lib-row{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px;margin:0 18px 8px;display:flex;align-items:center;gap:12px}
.lib-ic{width:40px;height:40px;border-radius:11px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:20px}
.lib-name{font-weight:700;font-size:14px}.lib-cat{font-size:11.5px;color:var(--muted);font-weight:600}
.lib-add{margin-left:auto;border:1.5px solid var(--accent);background:transparent;color:var(--accent-dark);font-family:inherit;font-weight:700;font-size:13px;padding:7px 13px;border-radius:10px;cursor:pointer;flex-shrink:0}
.lib-add.added{background:var(--accent);color:#fff;border-color:var(--accent)}
.lib-add:active{transform:scale(.94)}
.lib-row.pick{border-color:var(--accent);background:var(--accent-soft)}

function cdSpark(data,color){const w=72,h=22,mn=Math.min(...data),mx=Math.max(...data),r=(mx-mn)||1;
 const d=data.map((v,i)=>{const x=i*w/(data.length-1),y=h-2-((v-mn)/r)*(h-4);return (i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)}).join(' ');
 return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:22px"><path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`}
function cdArea(data,color,gid){const w=240,h=48,mn=Math.min(...data),mx=Math.max(...data),r=(mx-mn)||1;
 const pts=data.map((v,i)=>[i*w/(data.length-1),h-4-((v-mn)/r)*(h-12)]);
 const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
 return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:48px"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".35"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="${line} L ${w} ${h} L 0 ${h} Z" fill="url(#${gid})"/><path d="${line}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`}
function cdBars(data,color){const w=240,h=48,mx=Math.max(...data)||1,bw=w/data.length;
 const bars=data.map((v,i)=>{const bh=Math.max(3,(v/mx)*(h-4)),x=i*bw+1.5;return `<rect x="${x.toFixed(1)}" y="${(h-bh).toFixed(1)}" width="${(bw-3).toFixed(1)}" height="${bh.toFixed(1)}" rx="1.5" fill="${color}"/>`}).join('');
 return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:48px">${bars}</svg>`}

function lineChart(data){if(!data.length)return'';const w=320,h=130,pad=24;const min=Math.min(...data),max=Math.max(...data),rng=(max-min)||1;
 const pts=data.map((v,i)=>{const x=pad+(i*(w-2*pad)/(data.length-1||1));const y=h-pad-((v-min)/rng)*(h-2*pad);return[x,y]});
 const path=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
 const dots=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="4" fill="var(--accent)"/>`).join('');
 const labels=data.map((v,i)=>`<text x="${pts[i][0].toFixed(1)}" y="${h-6}" font-size="9" fill="var(--muted)" text-anchor="middle">W${i+1}</text>`).join('');
 return `<svg viewBox="0 0 ${w} ${h}" style="width:100%"><path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}${labels}<text x="${pad}" y="14" font-size="10" font-weight="700" fill="var(--ink)">${data[0]}</text><text x="${w-pad}" y="14" font-size="10" font-weight="700" fill="var(--accent)" text-anchor="end">${data[data.length-1]}</text></svg>`;
}

function vSession(){const c=cur(),cat=CATS[c.cat],wk=4;
 const today=c.exercises.filter(e=>!e.future);
 const done=exDone[c.id]||{};
 const total=today.length, doneCount=today.filter(e=>done[e.name]).length;
 const status=attStatus[c.id];                 // undefined | present | absent | cancelled
 const present=status==='present';
 const closed=status==='absent'||status==='cancelled';
 const dayDone=sessDone[c.id]===true;

 // header status chip
 let chip='';
 if(present)chip=`<div class="att-chip ap">✓ Present</div>`;
 else if(status==='absent')chip=`<div class="att-chip aa">✕ Absent</div>`;
 else if(status==='cancelled')chip=`<div class="att-chip ac2">🚫 Cancelled</div>`;

 const head=`<div class="sx-head">
   <div class="dava" style="width:58px;height:58px;font-size:20px;margin-bottom:8px;background:${cat.b};color:${cat.c}">${initials(c.name)}</div>
   <div class="dname" style="font-size:19px">${c.name}</div>
   <div class="dmeta">Mon 19 May · ${c.time} · ${c.coach}</div>
   ${chip}
   ${present?`<div class="sx-progress"><div class="sx-bar"><div class="sx-fill" style="width:${total?doneCount/total*100:0}%"></div></div><span>${doneCount}/${total} done</span></div>`:''}
  </div>`;

 // CLOSED (absent / cancelled)
 if(closed){
  return `<div class="fadein"><div class="bar solid"><button class="iconbtn" onclick="tab('home')">‹</button><div class="bar-title">Today's session</div></div>
   ${head}
   <div class="sx-closed"><div class="sx-closed-ic">${status==='absent'?'✕':'🚫'}</div>
    <div class="sx-closed-t">Session ${status}</div>
    <div class="sx-closed-s">No workout to log for today. ${status==='absent'?'Marked as a missed session.':'This session was cancelled.'}</div>
    <button class="sx-undo" onclick="attStatus[${c.id}]=undefined;sessDone[${c.id}]=undefined;render()">Undo</button></div>
   <div style="height:20px"></div></div>`;
 }

 // BEFORE PRESENT — slide to confirm, exercises locked
 if(!present){
  const lockedCards=today.map(ex=>{const log=ex.logs[wk]||ex.logs[wk-1]||{w:0,r:8};const rep=isRepBased(ex);
   return `<div class="sx-card sx-locked"><div class="sx-check">🔒</div>
     <div class="sx-main"><div class="sx-name">${ex.name}</div>
      <div class="sx-prescribe">${ex.target} · ${rep?log.w+(/min/.test(ex.target)?' min':''):log.w+' kg'+' × '+log.r}</div></div></div>`}).join('');
  return `<div class="fadein"><div class="bar solid"><button class="iconbtn" onclick="tab('home')">‹</button><div class="bar-title">Today's session</div></div>
   ${head}
   <div class="slide-wrap" id="slideWrap">
     <div class="slide-track" id="slideTrack">
       <div class="slide-fill" id="slideFill"></div>
       <div class="slide-label" id="slideLabel">Slide to mark present →</div>
       <div class="slide-knob" id="slideKnob">→</div>
     </div>
   </div>
   <div class="slide-more"><button onclick="navTo('attMore',${c.id})">Not present? More options</button></div>
   <div class="wkbanner" style="padding:14px 18px 2px;font-weight:700;color:var(--muted);font-size:13px">🔒 Exercises unlock once marked present</div>
   ${lockedCards}
   <div style="height:24px"></div></div>`;
 }

 // PRESENT — exercises tappable
 const cards=today.map(ex=>{const log=ex.logs[wk]||ex.logs[wk-1]||{w:0,r:8};const rep=isRepBased(ex);const isDone=done[ex.name];
  return `<div class="sx-card ${isDone?'sx-done':''}" onclick="toggleExDone('${ex.name.replace(/'/g,"\\'")}')">
    <div class="sx-check ${isDone?'on':''}">${isDone?'✓':''}</div>
    <div class="sx-main"><div class="sx-name">${ex.name}</div>
     <div class="sx-prescribe">${ex.target} · ${rep?log.w+(/min/.test(ex.target)?' min':''):log.w+' kg'+' × '+log.r}</div></div>
   </div>`}).join('');
 return `<div class="fadein"><div class="bar solid"><button class="iconbtn" onclick="tab('home')">‹</button><div class="bar-title">Today's session</div></div>
  ${head}
  ${dayDone?`<div class="sx-complete-banner">🎉 All exercises done — session complete</div>`:`<div class="wkbanner" style="padding:14px 18px 2px;font-weight:700;color:var(--ink);font-size:14px">Tap each exercise as you complete it</div>`}
  ${cards}
  <div class="sx-link" onclick="openClient(${c.id});S.ctab='program';render()">Open full program to log loads ›</div>
  <div style="height:24px"></div></div>`;
}

  <div class="field"><label>Category</label><div class="chips">${Object.keys(CATS).map(c=>`<button class="cat-chip ${S.onCat===c?'sel':''}" data-cat="${c}" onclick="selOnCat('${c}')">${CATS[c].ic} ${c}</button>`).join('')}</div></div>
  ${S.onCat==='Sports specific'?`<div class="field"><label>Ability</label><div class="seg"><button class="${S.onAbility==='Abled'?'on':''}" onclick="S.onAbility='Abled';render()">Abled</button><button class="${S.onAbility==='Disabled'?'on':''}" onclick="S.onAbility='Disabled';render()">Disabled</button></div></div>`:''}`;
 if(st===2)body=`<div class="step-title">Questionnaire</div><div class="step-sub">Goals, history & lifestyle.</div>
  <div class="field"><label>Fitness goals</label><textarea id="o-goals" placeholder="What do they want to achieve?"></textarea></div>
  <div class="field"><label>Medical history</label><textarea id="o-medical" placeholder="Injuries, conditions, surgeries…"></textarea></div>
  <div class="field"><label>Current activity level</label><input id="o-activity" placeholder="e.g. Moderate — trains 2×/week"></div>`;
 if(st===3)body=`<div class="step-title">First assessment</div><div class="step-sub">Baseline numbers to track progress.</div>
  <div class="field"><label>Weight (kg)</label><input id="o-weight" type="number" inputmode="decimal" placeholder="e.g. 72"></div>
  <div class="field"><label>Waist (cm)</label><input id="o-waist" type="number" inputmode="decimal" placeholder="e.g. 84"></div>
  <div class="field"><label>Notes / fitness test</label><textarea id="o-notes" placeholder="e.g. Squat range limited, good cardio base"></textarea></div>
  <div class="field"><label>Baseline photo</label><div class="upload-tile" style="aspect-ratio:auto;padding:20px" onclick="toast('Add baseline photo')"><div style="font-size:26px">📷</div>Add before photo</div></div>`;
 if(st===4)body=`<div class="step-title">Welcome note</div><div class="step-sub">This is what the client sees first. Tap to choose.</div>
  <div class="field"><label>Training days</label><div class="daygrid">${DAY_ORDER.map(d=>`<button class="pill-sel ${S.onDays.includes(d)?'sel':''}" onclick="toggleDay('${d}')">${d}</button>`).join('')}</div><div class="pick-hint">${S.onDays.length?S.onDays.join(', '):'Tap days to select'}</div></div>
  <div class="field"><label>Time</label><div class="timegrid">${TIME_SLOTS.map(t=>`<button class="pill-sel ${S.onTime===t?'sel':''}" onclick="S.onTime='${t}';render()">${t}</button>`).join('')}</div></div>
  <div class="field"><label>Assigned coach</label><div class="selectwrap"><select onchange="S.onCoach=this.value">${coaches.map(co=>`<option value="${co.name}" ${S.onCoach===co.name?'selected':''}>${co.name} — ${co.role}</option>`).join('')}</select></div></div>
  <div class="field"><label>Welcome message</label>${MSGS.map((m,i)=>`<div class="msg-card ${S.onMsg===i?'sel':''}" onclick="S.onMsg=${i};render()">${m}</div>`).join('')}</div>`;
 return `<div class="fadein"><div class="bar solid"><button class="iconbtn" onclick="${st===1?"tab('clients')":'S.onStep--;render()'}">‹</button><div class="bar-title">New client · ${st}/4</div></div>
  <div class="steps">${dots}</div>${body}
  <div class="bottom-cta"><button class="bigbtn" onclick="onNext()">${st<4?'Continue':'Create client'}</button></div></div>`;
}
function selOnCat(c){S.onCat=c;render()}
function toggleDay(d){const i=S.onDays.indexOf(d);if(i<0)S.onDays.push(d);else S.onDays.splice(i,1);S.onDays.sort((a,b)=>DAY_ORDER.indexOf(a)-DAY_ORDER.indexOf(b));render()}
let draft={};
function onNext(){const st=S.onStep;
 if(st===1){const n=document.getElementById('o-name').value.trim();if(!n){toast('Enter a name');return}draft={name:n,age:document.getElementById('o-age').value||'—',phone:document.getElementById('o-phone').value||'—',cat:S.onCat,ability:S.onAbility}}
 if(st===2){draft.goals=document.getElementById('o-goals').value||'—';draft.medical=document.getElementById('o-medical').value||'None reported';draft.activity=document.getElementById('o-activity').value||'—'}
 if(st===3){draft.weight=parseFloat(document.getElementById('o-weight').value)||0;draft.waist=parseFloat(document.getElementById('o-waist').value)||0}
 if(st<4){S.onStep++;render();sc();return}
 draft.days=S.onDays.length?S.onDays.join(', '):'—';draft.time=S.onTime;draft.coach=S.onCoach;draft.msg=MSGS[S.onMsg];
 const c={id:nextId++,name:draft.name,age:draft.age,phone:draft.phone,cat:draft.cat,ability:draft.ability,status:'Active',coach:draft.coach,start:'Today',sessions:0,days:draft.days,time:draft.time,goals:draft.goals,medical:draft.medical,activity:draft.activity,injuries:'None',weights:draft.weight?[draft.weight]:[],measures:draft.weight?{Weight:[draft.weight],Waist:draft.waist?[draft.waist]:[]}:{},photos:[],exercises:[{name:'Tap to add exercise',target:'set in program',logs:{}}]};
 clients.push(c);reviewState[c.id]={due:false,ago:'just now'};openClient(c.id);toast(c.name.split(' ')[0]+' added 🎉');
}

function vReport(){const c=cur(),wk=4;
 const lines=c.exercises.filter(e=>e.logs[wk]).map(ex=>{const cw=ex.logs[wk],pw=ex.logs[wk-1];let ch='—',cls='flat';if(pw){const d=Math.round((cw.w-pw.w)*10)/10;if(d>0){ch='↑ +'+d;cls='up'}else if(d<0){ch='↓ '+d;cls='down'}else{ch='maintained';cls='flat'}}return `<div class="rep-line"><span class="ex">${ex.name}</span><span class="ch ${cls}">${ch}</span></div>`}).join('');
 const ups=c.exercises.filter(e=>{const cw=e.logs[wk],pw=e.logs[wk-1];return pw&&cw.w>pw.w}).length;
 return `<div class="fadein"><div class="bar solid"><button class="iconbtn" onclick="${S.role==='client'?"tab('home')":"navTo('report')||tab('reports')"}">‹</button><div class="bar-title">Weekly report</div></div>
  <div class="report"><div class="rep-logo"><div class="ic">💪</div><div><div class="t">FitTrack</div><div class="sub">Week 4 progress · ${WD[4]}</div></div></div>

   <div class="rep-grid"><div class="rep-stat"><div class="v">${c.sessions}</div><div class="l">Total sessions</div></div><div class="rep-stat"><div class="v">${ups}/${c.exercises.length}</div><div class="l">Exercises improved</div></div></div>
   <div class="rep-st">This week's changes</div>${lines}</div>
  ${S.role!=='client'?`<div class="bottom-cta"><button class="bigbtn" onclick="sendReport('WhatsApp')">📲 Share on WhatsApp</button><button class="bigbtn ghost" style="margin-top:10px" onclick="sendReport('Email')">✉️ Send by email</button></div>`:'<div style="height:20px"></div>'}</div>`;
}
function sendReport(via){const c=cur();let r=reports.find(x=>x.clientId===c.id);if(r)r.sent=true,r.when='Just now';else reports.push({clientId:c.id,week:4,sent:true,when:'Just now'});tab('reports');toast('Report sent to '+c.name.split(' ')[0]+' via '+via)}

/* ============ EXERCISE LIBRARY ============ */
function vLibrary(){
 const attach=S.attachTo!=null;
 const c=attach?clients.find(x=>x.id===S.attachTo):null;
 const back=attach?`onclick="S.attachTo=null;S.clientId=${S.attachTo};openClientTab('program')"`:`onclick="tab('more')"`;

 }).join('');

     <div class="seg"><button class="${S.effFrom==='now'?'on':''}" onclick="S.effFrom='now';render()">This week</button><button class="${S.effFrom==='next'?'on':''}" onclick="S.effFrom='next';render()">Next week</button></div>

/* ============ RENDER ============ */
const VIEWS={client:vClient,clientTabs:vClientTabs,session:vSession,attMore:vAttMore,onboard:vOnboard,report:vReport,announce:vAnnounce,annNew:vAnnNew,coachAtt:vCoachAtt,library:vLibrary};
const TABS={home:vHome,clients:vClients,schedule:vSchedule,reports:vReports,more:vMore};
function render(){
 let html;
 if(S.view&&VIEWS[S.view])html=VIEWS[S.view]();
 else html=TABS[S.tab]();
 document.getElementById('screen').innerHTML=html;
 const showChrome=!S.view;
 const tb=document.getElementById('tabbar');
 tb.style.display=showChrome?'flex':'none';
 document.getElementById('fab').style.display=(showChrome&&S.tab==='clients'&&S.role!=='client')?'flex':'none';
 if(showChrome){
  const items=[['home','🏠','Home'],['clients','👥','Clients'],['schedule','📅','Schedule'],['reports','📊','Reports'],['more','⋯','More']];
  tb.innerHTML=items.map(([k,ic,l])=>`<div class="tabitem ${S.tab===k?'on':''}" onclick="tab('${k}')"><span class="ic">${ic}</span>${l}</div>`).join('');
 }
 // live preview wiring for announcement
 if(S.view==='annNew'){const ti=document.getElementById('a-title'),mi=document.getElementById('a-msg');if(ti)ti.oninput=()=>{document.getElementById('pv-t').textContent=ti.value||'Your announcement'};if(mi)mi.oninput=()=>{document.getElementById('pv-m').textContent=mi.value||'Message preview…'}}
 // slide-to-confirm wiring
 if(S.view==='session')wireSlide();
}
function wireSlide(){
 const track=document.getElementById('slideTrack');if(!track)return;
 const knob=document.getElementById('slideKnob'),fill=document.getElementById('slideFill'),label=document.getElementById('slideLabel');
 const id=S.clientId;let dragging=false,startX=0,x=0;
 const pad=4,knobW=54;
 const maxX=()=>track.clientWidth-knobW-pad*2;
 const moveTo=px=>{x=Math.max(0,Math.min(maxX(),px));knob.style.left=(pad+x)+'px';fill.style.width=(knobW+x)+'px';
  const pct=x/maxX();label.style.opacity=String(1-pct*1.4);};
 const start=e=>{dragging=true;startX=(e.touches?e.touches[0].clientX:e.clientX)-x;};
 const move=e=>{if(!dragging)return;const cx=(e.touches?e.touches[0].clientX:e.clientX);moveTo(cx-startX);if(e.cancelable)e.preventDefault();};
 const end=()=>{if(!dragging)return;dragging=false;
  if(x>=maxX()-6){knob.style.left=(pad+maxX())+'px';fill.style.width='100%';setAttendance(id,'present');}
  else{knob.style.transition='left .2s';fill.style.transition='width .2s';moveTo(0);label.style.opacity='1';setTimeout(()=>{knob.style.transition='';fill.style.transition='';},220);}
 };
 // remove any stale window listeners from a previous render
 if(window._slideMove){window.removeEventListener('mousemove',window._slideMove);window.removeEventListener('touchmove',window._slideMove);window.removeEventListener('mouseup',window._slideEnd);window.removeEventListener('touchend',window._slideEnd);}
 window._slideMove=move;window._slideEnd=end;
 knob.addEventListener('mousedown',start);knob.addEventListener('touchstart',start,{passive:true});
 window.addEventListener('mousemove',move);window.addEventListener('touchmove',move,{passive:false});
 window.addEventListener('mouseup',end);window.addEventListener('touchend',end);
}
// start at login-like home
S.tab='home';render();
</script>
